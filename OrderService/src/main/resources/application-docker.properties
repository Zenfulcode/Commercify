spring.application.name=order-service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.port=8081
product.service.url=http://localhost:8083/api/v1/products
payment.service.url=http://localhost:8082/api/v1/payments
user.service.url=http://localhost:8084/api/v1/users
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
security.jwt.secret-key=${SPRING_JWT_SECRET_KEY}
