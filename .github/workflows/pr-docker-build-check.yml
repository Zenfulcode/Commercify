name: Pull Request Docker Build Check

on:
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  check-docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        docker_services: [ payments, products, orders, users ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all JARs
        run: |
          for service in PaymentService ProductsService OrderService UserService; do
            mvn clean package -DskipTests -f $service/pom.xml
          done

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}Service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}