name: Pull Request Docker Build Check

on:
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  check-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all JARs
        run: |
          for service in PaymentService ProductsService OrderService UserService; do
            mvn clean package -DskipTests -f $service/pom.xml
          done

      - name: Build Payment Service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./PaymentService
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/commercify_payments:pr-${{ github.event.pull_request.number }}

      - name: Build Product Service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ProductsService
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/commercify_products:pr-${{ github.event.pull_request.number }}

      - name: Build Order Service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./OrderService
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/commercify_orders:pr-${{ github.event.pull_request.number }}

      - name: Build User Service Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./UserService
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.actor }}/commercify_users:pr-${{ github.event.pull_request.number }}